<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <!-- Rotor sweep disks (faint, shows blade rotation area) -->
  <g fill="none" stroke="#22C55E" stroke-width="1" opacity="0.35">
    <circle cx="60" cy="38" r="26"/>
    <circle cx="60" cy="82" r="26"/>
  </g>

  <!-- Main fuselage (tandem-rotor body, nose at top, ramp at bottom) -->
  <path d="M 50 30
           Q 50 18 60 15
           Q 70 18 70 30
           L 70 90
           Q 70 96 67 100
           L 53 100
           Q 50 96 50 90
           Z"
        fill="#22C55E"/>

  <!-- Cockpit windows hint -->
  <path d="M 54 22 Q 60 18 66 22 L 66 26 L 54 26 Z" fill="#16A34A" opacity="0.55"/>

  <!-- Side sponsons (fuel tanks along the fuselage) -->
  <rect x="46" y="50" width="4" height="32" rx="1.5" fill="#16A34A"/>
  <rect x="70" y="50" width="4" height="32" rx="1.5" fill="#16A34A"/>

  <!-- Rear pylon (raised housing for aft rotor) -->
  <rect x="52" y="78" width="16" height="10" rx="2" fill="#16A34A"/>

  <!-- Front rotor blades (3-blade) -->
  <g stroke="#22C55E" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="38" x2="60" y2="14"/>
    <line x1="60" y1="38" x2="80.8" y2="50"/>
    <line x1="60" y1="38" x2="39.2" y2="50"/>
  </g>

  <!-- Rear rotor blades (3-blade, offset 60° from front) -->
  <g stroke="#22C55E" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="82" x2="60" y2="106"/>
    <line x1="60" y1="82" x2="80.8" y2="70"/>
    <line x1="60" y1="82" x2="39.2" y2="70"/>
  </g>

  <!-- Rotor hubs -->
  <circle cx="60" cy="38" r="3.5" fill="#15803D"/>
  <circle cx="60" cy="82" r="3.5" fill="#15803D"/>
</svg>
